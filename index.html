// ANONYMOUS TELEMETRY
// Tiny beacon so we learn about issues users hit in the wild.
// No PII: no lat/lng, no UA, no IP (Caddy strips those server-side).
// SESSION is random per page load and never persisted, so two
// visits from the same device aren't correlatable.
// ============================================================
const SESSION = Math.random().toString(36).slice(2, 10);
const _loggedOnce = new Set();
function beacon(event, extras = {}) {
  const params = new URLSearchParams({ e: event, s: SESSION, t: String(Date.now()) });
  for (const [k, v] of Object.entries(extras)) {
    params.set(k, String(v).slice(0, 80));
  }
  const url = `/log?${params.toString()}`;
  try {
    if (navigator.sendBeacon) navigator.sendBeacon(url);
    else fetch(url, { method: "POST", keepalive: true }).catch(() => {});
  } catch (_) {}
}
function beaconOnce(key, event, extras) {
  if (_loggedOnce.has(key)) return;
  _loggedOnce.add(key);
  beacon(event, extras);
}
window.addEventListener("error", (e) => {
  beacon("js_error", {
    msg: (e.message || "").slice(0, 80),
    src: (e.filename || "").split("/").pop().slice(0, 40),
    line: e.lineno || 0
  });
});
window.addEventListener("unhandledrejection", (e) => {
  beacon("js_reject", { msg: String(e.reason || "").slice(0, 80) });
});

// ============================================================
// TIME UTILS
// ============================================================
function hmToMin(hm) {
  const [h, m] = hm.split(":").map(Number);
  return h * 60 + m;
}
function minToHM(min) {
  min = ((min % 1440) + 1440) % 1440;
  const h = Math.floor(min / 60), m = min % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function nowMinutes(date = new Date()) {
  return date.getHours() * 60 + date.getMinutes() + date.getSeconds() / 60;
}
function isWeekend(date = new Date()) {
  const d = date.getDay(); return d === 0 || d === 6;
}

// ============================================================
// SCHEDULE LOGIC
// Each terminal has its own pre-rounded list of departure times (above).
// "Arrival at user's station" = terminal departure + travel offset.
// We just walk the list once per render — it's ~140 entries, negligible.
// ============================================================

// Precompute minute-of-day arrays at module load, so the hot path
// (called every 5s while a station card is on screen) skips parsing.
const _SCHED_MINS = {
  weekday: {
    northbound: DATA.schedule.weekday.northbound.map(hmToMin),
    southbound: DATA.schedule.weekday.southbound.map(hmToMin)
  },
  weekend: {
    northbound: DATA.schedule.weekend.northbound.map(hmToMin),
    southbound: DATA.schedule.weekend.southbound.map(hmToMin)
  }
};

// Per-station static arrival tables (preferred over the offset model when
// present). Same shape as _SCHED_MINS but keyed by station id.
const _STATION_MINS = {};
for (const [id, days] of Object.entries(DATA.station_schedules)) {
  _STATION_MINS[id] = {};
  for (const [day, dirs] of Object.entries(days)) {
    _STATION_MINS[id][day] = {};
    for (const [dir, times] of Object.entries(dirs)) {
      _STATION_MINS[id][day][dir] = times.map(hmToMin);
    }
  }
}

function nextArrivalsAtStation(station, direction, nowMin, date = new Date()) {
  // northbound = from Lebak Bulus toward Bundaran HI
  // southbound = from Bundaran HI toward Lebak Bulus
  const dayKey = isWeekend(date) ? "weekend" : "weekday";
  const staticList = _STATION_MINS[station.id]?.[dayKey]?.[direction];
  const arrivals = [];

  if (staticList) {
    for (const arr of staticList) {
      if (arr >= nowMin) {
        arrivals.push(arr);
        if (arrivals.length >= 3) break;
      }
    }
  } else {
    // Fallback: terminal departure + per-station travel offset
    const offset = direction === "northbound" ? station.offset_nb : station.offset_sb;
    for (const dep of _SCHED_MINS[dayKey][direction]) {
      const arr = dep + offset;
      if (arr >= nowMin) {
        arrivals.push(arr);
        if (arrivals.length >= 3) break;
      }
    }
  }
  return arrivals;
}

// ============================================================
// GEO
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function nearestStation(lat, lon, maxMeters = 300) {
  let best = null, bestDist = Infinity;
  for (const s of DATA.stations) {
    const d = haversine(lat, lon, s.lat, s.lon);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return bestDist <= maxMeters ? { station: best, distance: bestDist } : null;
}

// ============================================================
// VERDICT
// slack = minutes until train - walk_time (in minutes)
// ============================================================
function verdict(minutesUntil, station) {
  const walkMin = DATA.walk_seconds[station.type] / 60;
  const slack = minutesUntil - walkMin;

  if (minutesUntil < 0) return { class: "missed", verdict: "MISSED", sub: "next train shown below" };
  if (slack < 0)          return { class: "missed", verdict: "TOO LATE", sub: `need ${walkMin.toFixed(1)} min to platform` };
  if (slack < 0.5)        return { class: "dash",   verdict: "DASH!",    sub: `only ${(slack*60).toFixed(0)}s of slack` };
  if (slack < 2)          return { class: "walk",   verdict: "WALK FAST", sub: `${slack.toFixed(1)} min to spare` };
  return                         { class: "chill",  verdict: "CHILL",    sub: `${slack.toFixed(1)} min to spare` };
}

// ============================================================
// UI
// ============================================================
let currentStation = null;
let refreshInterval = null;

function fmtMinutes(m) {
  if (m < 1) return `${Math.round(m * 60)}s`;
  return `${m.toFixed(1)} min`;
}

function renderDirections(station) {
  const content = document.getElementById("content");
  const now = nowMinutes();

  const isTerminalSouth = station.id === "LBB";
  const isTerminalNorth = station.id === "BHI";

  const directions = [];
  if (!isTerminalNorth) directions.push({ key: "northbound", toward: "Bundaran HI" });
  if (!isTerminalSouth) directions.push({ key: "southbound", toward: "Lebak Bulus" });

  content.innerHTML = "";
  for (const dir of directions) {
    const arrivals = nextArrivalsAtStation(station, dir.key, now);

    const card = document.createElement("div");
    card.className = "direction-card";

    if (arrivals.length === 0) {
      card.classList.add("closed");
      beaconOnce(`closed:${station.id}:${dir.key}`, "station_closed", {
        st: station.id, dir: dir.key, hm: minToHM(Math.floor(now))
      });
      card.innerHTML = `
        <div class="dir-top">
          <div>
            <div class="dir-name">${dir.key === "northbound" ? "↑ Northbound" : "↓ Southbound"}</div>
            <div class="dir-toward">toward ${dir.toward}</div>
          </div>
        </div>
        <div class="verdict" style="font-size:28px">— CLOSED —</div>
        <div class="verdict-sub">no more trains today</div>
        <div class="dir-bottom"><span></span><span></span></div>
      `;
    } else {
      const minUntil = arrivals[0] - now;
      const v = verdict(minUntil, station);
      card.classList.add(v.class);

      const nextNext = arrivals[1] != null
        ? `next after: ${fmtMinutes(arrivals[1] - now)} · ${minToHM(arrivals[1])}`
        : "";

      card.innerHTML = `
        <div class="dir-top">
          <div>
            <div class="dir-name">${dir.key === "northbound" ? "↑ Northbound" : "↓ Southbound"}</div>
            <div class="dir-toward">toward ${dir.toward}</div>
          </div>
          <div style="text-align:right; font-size:13px; opacity:0.8">
            in ${fmtMinutes(minUntil)}<br>
            <span style="font-variant-numeric:tabular-nums">${minToHM(arrivals[0])}</span>
          </div>
        </div>
        <div>
          <div class="verdict">${v.verdict}</div>
          <div class="verdict-sub">${v.sub}</div>
        </div>
        <div class="dir-bottom">
          <span class="next-train">${nextNext}</span>
          <span>walk: ~${DATA.walk_seconds[station.type]}s</span>
        </div>
      `;
    }

    content.appendChild(card);
  }
}

function populatePicker() {
  const picker = document.getElementById("stationPicker");
  picker.innerHTML = '<option value="">change station…</option>';
  for (const s of DATA.stations) {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.name;
    picker.appendChild(opt);
  }
  picker.style.display = "inline-block";
  picker.onchange = (e) => {
    const s = DATA.stations.find(x => x.id === e.target.value);
    if (s) {
      beacon("manual_pick", { st: s.id });
      setStation(s);
      e.target.value = "";
    }
  };
}

function setStation(station) {
  currentStation = station;
  document.getElementById("stationName").textContent = station.name;
  populatePicker();
  renderDirections(station);
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => renderDirections(station), 5000);
}

function showStationList(msg) {
  const content = document.getElementById("content");
  content.innerHTML = `<div class="status">${msg}<br><br>Pick your station below ↓</div>`;
  document.getElementById("stationName").textContent = "Not detected";
  populatePicker();
}

// ============================================================
// BOOTSTRAP
// ============================================================
function startClock() {
  const tick = () => {
    const d = new Date();
    document.getElementById("clock").textContent =
      `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
  };
  tick();
  setInterval(tick, 1000);
}

function init() {
  startClock();

  if (!("geolocation" in navigator)) {
    beacon("geo_unsupported");
    showStationList("Geolocation not supported on this device.");
    return;
  }

  // First try: quick, low-accuracy fix from cell/WiFi (usually <2s).
  // If we land within 400m of a station, that's already good enough.
  // Otherwise retry with high-accuracy GPS for a tighter fix.
  const tryGetLocation = (highAccuracy, timeoutMs, onDone) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => onDone(null, pos),
      (err) => onDone(err, null),
      { enableHighAccuracy: highAccuracy, timeout: timeoutMs, maximumAge: 60000 }
    );
  };

  const onLocation = (err, pos) => {
    if (err) {
      beacon("geo_error", { code: err.code });
      let msg = "Couldn't get your location.";
      if (err.code === 1) msg = "Location permission denied. Enable it in your browser settings, then reload.";
      else if (err.code === 2) msg = "Location unavailable. Are location services on for this device?";
      else if (err.code === 3) msg = "Location request timed out.";
      showStationList(msg);
      return;
    }
    const hit = nearestStation(pos.coords.latitude, pos.coords.longitude, 400);
    if (hit) {
      setStation(hit.station);
    } else {
      beacon("no_station_match");
      showStationList("You're not near any MRT station (within 400m).");
    }
  };

  // Fast attempt first; if it fails or returns no station, fall back to GPS.
  tryGetLocation(false, 6000, (err, pos) => {
    if (!err) {
      const hit = nearestStation(pos.coords.latitude, pos.coords.longitude, 400);
      if (hit) { setStation(hit.station); return; }
    }
    // Either an error, or we got a fix but weren't near a station.
    // Retry with high-accuracy GPS and a generous timeout.
    tryGetLocation(true, 20000, onLocation);
  });
}

init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
