<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MRT Dash">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>MRT Dash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 20px 16px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #888;
  }
  .clock {
    font-size: 13px;
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  .station-bar {
    margin: 18px 0 14px;
  }
  .station-label {
    font-size: 11px;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .station-name {
    font-size: 26px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .station-picker {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 13px;
    margin-left: auto;
  }
  .directions {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 10px;
    min-height: 0;
  }
  .direction-card {
    flex: 1;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: background 0.3s;
    position: relative;
    overflow: hidden;
  }
  .direction-card.chill   { background: linear-gradient(135deg, #0f3d2e 0%, #1a5c43 100%); }
  .direction-card.walk    { background: linear-gradient(135deg, #4a3b0f 0%, #7a5f15 100%); }
  .direction-card.dash    { background: linear-gradient(135deg, #6b1414 0%, #a11f1f 100%); animation: pulse 1s infinite; }
  .direction-card.missed  { background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%); }
  .direction-card.closed  { background: #1a1a1a; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }
  .dir-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .dir-name {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .dir-toward {
    font-size: 17px;
    font-weight: 600;
    margin-top: 3px;
  }
  .verdict {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-top: 14px;
  }
  .verdict-sub {
    font-size: 14px;
    opacity: 0.85;
    margin-top: 6px;
  }
  .dir-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: auto;
    padding-top: 12px;
    font-size: 12px;
    opacity: 0.75;
  }
  .next-train {
    font-variant-numeric: tabular-nums;
  }
  .status {
    text-align: center;
    padding: 40px 20px;
    color: #888;
    font-size: 15px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .error {
    background: #2a1515;
    color: #ff9999;
    padding: 14px;
    border-radius: 12px;
    font-size: 13px;
    margin-top: 12px;
  }
  .footer-note {
    font-size: 10px;
    color: #555;
    text-align: center;
    margin-top: 10px;
  }
  .loading-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: blink 1s infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">MRT DASH</div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <div class="station-bar">
    <div class="station-label">Station</div>
    <div class="station-name">
      <span id="stationName">Locating…</span>
      <select class="station-picker" id="stationPicker" style="display:none">
        <option value="">change…</option>
      </select>
    </div>
  </div>

  <div id="content" class="directions">
    <div class="status"><span class="loading-dot"></span>Getting location…</div>
  </div>

  <div class="footer-note" id="footerNote">weekday: official MRTJ timetable · weekend: ~10 min approx</div>
</div>

<script>
// ============================================================
// ANONYMOUS TELEMETRY
// Tiny beacon so we learn about issues users hit in the wild.
// No PII: no lat/lng, no UA, no IP (Caddy strips those server-side).
// SESSION is random per page load and never persisted, so two
// visits from the same device aren't correlatable.
// ============================================================
const SESSION = Math.random().toString(36).slice(2, 10);
const _loggedOnce = new Set();
function beacon(event, extras = {}) {
  const params = new URLSearchParams({ e: event, s: SESSION, t: String(Date.now()) });
  for (const [k, v] of Object.entries(extras)) {
    params.set(k, String(v).slice(0, 80));
  }
  const url = `/log?${params.toString()}`;
  try {
    if (navigator.sendBeacon) navigator.sendBeacon(url);
    else fetch(url, { method: "POST", keepalive: true }).catch(() => {});
  } catch (_) {}
}
function beaconOnce(key, event, extras) {
  if (_loggedOnce.has(key)) return;
  _loggedOnce.add(key);
  beacon(event, extras);
}
window.addEventListener("error", (e) => {
  beacon("js_error", {
    msg: (e.message || "").slice(0, 80),
    src: (e.filename || "").split("/").pop().slice(0, 40),
    line: e.lineno || 0
  });
});
window.addEventListener("unhandledrejection", (e) => {
  beacon("js_reject", { msg: String(e.reason || "").slice(0, 80) });
});

// ============================================================
// DATA
// ============================================================
const DATA = {
  stations: [
    { id: "LBB", name: "Lebak Bulus BSI",      lat: -6.28910, lon: 106.77510, type: "elevated",    offset_nb: 0  },
    { id: "FTM", name: "Fatmawati Indomaret",  lat: -6.29350, lon: 106.79280, type: "elevated",    offset_nb: 3  },
    { id: "CPR", name: "Cipete Raya TUKU",     lat: -6.27810, lon: 106.79710, type: "elevated",    offset_nb: 5  },
    { id: "HJN", name: "Haji Nawi",            lat: -6.26620, lon: 106.79770, type: "elevated",    offset_nb: 7  },
    { id: "BLA", name: "Blok A",               lat: -6.25570, lon: 106.79770, type: "elevated",    offset_nb: 9  },
    { id: "BLM", name: "Blok M BCA",           lat: -6.24440, lon: 106.79830, type: "elevated",    offset_nb: 12 },
    { id: "ASN", name: "ASEAN",                lat: -6.23720, lon: 106.79830, type: "elevated",    offset_nb: 14 },
    { id: "SNY", name: "Senayan Mastercard",   lat: -6.22590, lon: 106.80250, type: "elevated",    offset_nb: 17 },
    { id: "IST", name: "Istora Mandiri",       lat: -6.22480, lon: 106.80730, type: "underground", offset_nb: 19 },
    { id: "BNH", name: "Bendungan Hilir",      lat: -6.21230, lon: 106.81800, type: "underground", offset_nb: 22 },
    { id: "STB", name: "Setiabudi Astra",      lat: -6.20860, lon: 106.82170, type: "underground", offset_nb: 24 },
    { id: "DKA", name: "Dukuh Atas BNI",       lat: -6.20180, lon: 106.82290, type: "underground", offset_nb: 27 },
    { id: "BHI", name: "Bundaran HI Bank DKI", lat: -6.19510, lon: 106.82300, type: "underground", offset_nb: 29 }
  ],
  // Official MRTJ terminal-departure timetables, rounded to the nearest
  // minute. Source PDFs are checked into Data_from_MRTJ/ (Jadwal_LBB.pdf
  // for northbound, Jadwal_BHI.pdf for southbound) — re-fetch from
  // jakartamrt.co.id/jadwal-keberangkatan when MRTJ revises the schedule.
  //
  // Two streams (not one) because the terminals don't dispatch in phase:
  // LBB's PM peak is anchored ~16:31 while BHI's is ~16:41, etc. Treating
  // them as one stream offsets every prediction by about a minute.
  //
  // Weekend is still a placeholder synthesized 10-min headway — we don't
  // have the MRTJ weekend PDFs parsed yet.
  schedule: {
    weekday: {
      northbound: [
        "05:00","05:12","05:24","05:36","05:46","05:55","06:03","06:10",
        "06:18","06:25","06:32","06:39","06:45","06:50","06:55","07:00",
        "07:05","07:10","07:15","07:20","07:25","07:30","07:35","07:40",
        "07:45","07:50","07:55","08:00","08:05","08:10","08:15","08:20",
        "08:25","08:30","08:35","08:40","08:45","08:51","08:58","09:06",
        "09:13","09:20","09:27","09:35","09:43","09:51",
        "10:00","10:10","10:20","10:30","10:40","10:50","11:00","11:10",
        "11:20","11:30","11:40","11:50","12:00","12:10","12:20","12:30",
        "12:40","12:50","13:00","13:10","13:20","13:30","13:40","13:50",
        "14:00","14:10","14:20","14:30","14:40","14:50","15:00","15:09",
        "15:18","15:26","15:34","15:42","15:49","15:55","16:01","16:06",
        "16:12","16:17","16:22","16:27","16:32","16:37","16:42","16:47",
        "16:52","16:57","17:02","17:07","17:12","17:17","17:22","17:27",
        "17:32","17:37","17:42","17:47","17:52","17:57","18:02","18:07",
        "18:12","18:19","18:26","18:33","18:41","18:51","19:00","19:10",
        "19:20","19:30","19:40","19:50","20:00","20:10","20:20","20:30",
        "20:40","20:50","21:00","21:10","21:20","21:30","21:40","21:50",
        "22:00","22:10","22:21","22:33","22:45","22:57","23:12","23:27"
      ],
      southbound: [
        "05:07","05:22","05:34","05:46","05:58","06:10","06:21","06:31",
        "06:39","06:47","06:54","07:01","07:08","07:14","07:19","07:24",
        "07:29","07:34","07:39","07:44","07:49","07:54","07:59","08:04",
        "08:09","08:15","08:20","08:25","08:30","08:35","08:40","08:45",
        "08:51","08:56","09:01","09:06","09:11","09:16","09:21","09:26",
        "09:31","09:38","09:45","09:53",
        "10:01","10:08","10:16","10:25","10:34","10:44","10:54","11:04",
        "11:14","11:24","11:34","11:44","11:54","12:04","12:14","12:24",
        "12:34","12:44","12:54","13:04","13:14","13:24","13:34","13:44",
        "13:54","14:04","14:14","14:24","14:34","14:44","14:54","15:04",
        "15:14","15:24","15:34","15:43","15:51","15:59","16:07","16:14",
        "16:22","16:30","16:36","16:41","16:46","16:51","16:56","17:01",
        "17:06","17:11","17:16","17:21","17:26","17:31","17:36","17:42",
        "17:47","17:52","17:57","18:02","18:07","18:12","18:17","18:22",
        "18:27","18:32","18:37","18:42","18:48","18:55","19:03","19:10",
        "19:18","19:25","19:34","19:44","19:54","20:04","20:14","20:24",
        "20:34","20:44","20:54","21:04","21:14","21:24","21:34","21:44",
        "21:54","22:04","22:14","22:24","22:34","22:45","22:56","23:08",
        "23:20","23:32"
      ]
    },
    weekend: {
      // Placeholder until the MRTJ weekend timetable is parsed.
      // Both directions every 10 min from 05:00 to ~24:00.
      northbound: null, // filled in below
      southbound: null
    }
  },
  // walk time from gate through tap-in to platform (in seconds)
  walk_seconds: { elevated: 75, underground: 105 },
  total_trip_min: 29
};

// Fill in the weekend placeholder. Remove this once we parse a real PDF.
(() => {
  const out = [];
  for (let m = 5 * 60; m < 24 * 60; m += 10) {
    const h = Math.floor(m / 60), mm = m % 60;
    out.push(`${String(h).padStart(2,"0")}:${String(mm).padStart(2,"0")}`);
  }
  DATA.schedule.weekend.northbound = out;
  DATA.schedule.weekend.southbound = out;
})();

// ============================================================
// TIME UTILS
// ============================================================
function hmToMin(hm) {
  const [h, m] = hm.split(":").map(Number);
  return h * 60 + m;
}
function minToHM(min) {
  min = ((min % 1440) + 1440) % 1440;
  const h = Math.floor(min / 60), m = min % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function nowMinutes(date = new Date()) {
  return date.getHours() * 60 + date.getMinutes() + date.getSeconds() / 60;
}
function isWeekend(date = new Date()) {
  const d = date.getDay(); return d === 0 || d === 6;
}

// ============================================================
// SCHEDULE LOGIC
// Each terminal has its own pre-rounded list of departure times (above).
// "Arrival at user's station" = terminal departure + travel offset.
// We just walk the list once per render — it's ~140 entries, negligible.
// ============================================================

// Precompute minute-of-day arrays at module load, so the hot path
// (called every 5s while a station card is on screen) skips parsing.
const _SCHED_MINS = {
  weekday: {
    northbound: DATA.schedule.weekday.northbound.map(hmToMin),
    southbound: DATA.schedule.weekday.southbound.map(hmToMin)
  },
  weekend: {
    northbound: DATA.schedule.weekend.northbound.map(hmToMin),
    southbound: DATA.schedule.weekend.southbound.map(hmToMin)
  }
};

function nextArrivalsAtStation(station, direction, nowMin, date = new Date()) {
  // northbound = from Lebak Bulus toward Bundaran HI
  // southbound = from Bundaran HI toward Lebak Bulus
  const offset = direction === "northbound"
    ? station.offset_nb
    : (DATA.total_trip_min - station.offset_nb);
  const list = (isWeekend(date) ? _SCHED_MINS.weekend : _SCHED_MINS.weekday)[direction];

  const arrivals = [];
  for (const dep of list) {
    const arr = dep + offset;
    if (arr >= nowMin) {
      arrivals.push(arr);
      if (arrivals.length >= 3) break;
    }
  }
  return arrivals;
}

// ============================================================
// GEO
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function nearestStation(lat, lon, maxMeters = 300) {
  let best = null, bestDist = Infinity;
  for (const s of DATA.stations) {
    const d = haversine(lat, lon, s.lat, s.lon);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return bestDist <= maxMeters ? { station: best, distance: bestDist } : null;
}

// ============================================================
// VERDICT
// slack = minutes until train - walk_time (in minutes)
// ============================================================
function verdict(minutesUntil, station) {
  const walkMin = DATA.walk_seconds[station.type] / 60;
  const slack = minutesUntil - walkMin;

  if (minutesUntil < 0) return { class: "missed", verdict: "MISSED", sub: "next train shown below" };
  if (slack < 0)          return { class: "missed", verdict: "TOO LATE", sub: `need ${walkMin.toFixed(1)} min to platform` };
  if (slack < 0.5)        return { class: "dash",   verdict: "DASH!",    sub: `only ${(slack*60).toFixed(0)}s of slack` };
  if (slack < 2)          return { class: "walk",   verdict: "WALK FAST", sub: `${slack.toFixed(1)} min to spare` };
  return                         { class: "chill",  verdict: "CHILL",    sub: `${slack.toFixed(1)} min to spare` };
}

// ============================================================
// UI
// ============================================================
let currentStation = null;
let refreshInterval = null;

function fmtMinutes(m) {
  if (m < 1) return `${Math.round(m * 60)}s`;
  return `${m.toFixed(1)} min`;
}

function renderDirections(station) {
  const content = document.getElementById("content");
  const now = nowMinutes();

  const isTerminalSouth = station.id === "LBB";
  const isTerminalNorth = station.id === "BHI";

  const directions = [];
  if (!isTerminalNorth) directions.push({ key: "northbound", toward: "Bundaran HI" });
  if (!isTerminalSouth) directions.push({ key: "southbound", toward: "Lebak Bulus" });

  content.innerHTML = "";
  for (const dir of directions) {
    const arrivals = nextArrivalsAtStation(station, dir.key, now);

    const card = document.createElement("div");
    card.className = "direction-card";

    if (arrivals.length === 0) {
      card.classList.add("closed");
      beaconOnce(`closed:${station.id}:${dir.key}`, "station_closed", {
        st: station.id, dir: dir.key, hm: minToHM(Math.floor(now))
      });
      card.innerHTML = `
        <div class="dir-top">
          <div>
            <div class="dir-name">${dir.key === "northbound" ? "↑ Northbound" : "↓ Southbound"}</div>
            <div class="dir-toward">toward ${dir.toward}</div>
          </div>
        </div>
        <div class="verdict" style="font-size:28px">— CLOSED —</div>
        <div class="verdict-sub">no more trains today</div>
        <div class="dir-bottom"><span></span><span></span></div>
      `;
    } else {
      const minUntil = arrivals[0] - now;
      const v = verdict(minUntil, station);
      card.classList.add(v.class);

      const nextNext = arrivals[1] != null
        ? `next after: ${fmtMinutes(arrivals[1] - now)} · ${minToHM(arrivals[1])}`
        : "";

      card.innerHTML = `
        <div class="dir-top">
          <div>
            <div class="dir-name">${dir.key === "northbound" ? "↑ Northbound" : "↓ Southbound"}</div>
            <div class="dir-toward">toward ${dir.toward}</div>
          </div>
          <div style="text-align:right; font-size:13px; opacity:0.8">
            in ${fmtMinutes(minUntil)}<br>
            <span style="font-variant-numeric:tabular-nums">${minToHM(arrivals[0])}</span>
          </div>
        </div>
        <div>
          <div class="verdict">${v.verdict}</div>
          <div class="verdict-sub">${v.sub}</div>
        </div>
        <div class="dir-bottom">
          <span class="next-train">${nextNext}</span>
          <span>walk: ~${DATA.walk_seconds[station.type]}s</span>
        </div>
      `;
    }

    content.appendChild(card);
  }
}

function populatePicker() {
  const picker = document.getElementById("stationPicker");
  picker.innerHTML = '<option value="">change station…</option>';
  for (const s of DATA.stations) {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.name;
    picker.appendChild(opt);
  }
  picker.style.display = "inline-block";
  picker.onchange = (e) => {
    const s = DATA.stations.find(x => x.id === e.target.value);
    if (s) {
      beacon("manual_pick", { st: s.id });
      setStation(s);
      e.target.value = "";
    }
  };
}

function setStation(station) {
  currentStation = station;
  document.getElementById("stationName").textContent = station.name;
  populatePicker();
  renderDirections(station);
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => renderDirections(station), 5000);
}

function showStationList(msg) {
  const content = document.getElementById("content");
  content.innerHTML = `<div class="status">${msg}<br><br>Pick your station below ↓</div>`;
  document.getElementById("stationName").textContent = "Not detected";
  populatePicker();
}

// ============================================================
// BOOTSTRAP
// ============================================================
function startClock() {
  const tick = () => {
    const d = new Date();
    document.getElementById("clock").textContent =
      `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
  };
  tick();
  setInterval(tick, 1000);
}

function init() {
  startClock();

  if (!("geolocation" in navigator)) {
    beacon("geo_unsupported");
    showStationList("Geolocation not supported on this device.");
    return;
  }

  // First try: quick, low-accuracy fix from cell/WiFi (usually <2s).
  // If we land within 400m of a station, that's already good enough.
  // Otherwise retry with high-accuracy GPS for a tighter fix.
  const tryGetLocation = (highAccuracy, timeoutMs, onDone) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => onDone(null, pos),
      (err) => onDone(err, null),
      { enableHighAccuracy: highAccuracy, timeout: timeoutMs, maximumAge: 60000 }
    );
  };

  const onLocation = (err, pos) => {
    if (err) {
      beacon("geo_error", { code: err.code });
      let msg = "Couldn't get your location.";
      if (err.code === 1) msg = "Location permission denied. Enable it in your browser settings, then reload.";
      else if (err.code === 2) msg = "Location unavailable. Are location services on for this device?";
      else if (err.code === 3) msg = "Location request timed out.";
      showStationList(msg);
      return;
    }
    const hit = nearestStation(pos.coords.latitude, pos.coords.longitude, 400);
    if (hit) {
      setStation(hit.station);
    } else {
      beacon("no_station_match");
      showStationList("You're not near any MRT station (within 400m).");
    }
  };

  // Fast attempt first; if it fails or returns no station, fall back to GPS.
  tryGetLocation(false, 6000, (err, pos) => {
    if (!err) {
      const hit = nearestStation(pos.coords.latitude, pos.coords.longitude, 400);
      if (hit) { setStation(hit.station); return; }
    }
    // Either an error, or we got a fix but weren't near a station.
    // Retry with high-accuracy GPS and a generous timeout.
    tryGetLocation(true, 20000, onLocation);
  });
}

init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
